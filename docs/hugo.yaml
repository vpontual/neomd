# Hugo configuration file
title: neomd

# Base URL will be set by GitHub Actions
baseURL: "https://neomd.ssp.sh/"

# canonifyURLs was needed for GitHub Pages project subdirectory (ssp-data.github.io/neomd/)
# No longer needed with custom domain at root
canonifyURLs: false

# Disable RSS generation to avoid template issues
disableKinds: ["RSS"]

# import hextra as module
# Hextra v0.12.2 is the latest version as of 2026-04-21.
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true
    parser:
      attribute:
        block: true
      autoHeadingID: true
      autoHeadingIDType: github

  # enable hextra syntax highlight
  highlight:
    noClasses: false

  tableOfContents:
    startLevel: 2
    endLevel: 6
    ordered: false

menu:
  main:
    - name: Documentation
      pageRef: /docs
      weight: 1
    - name: Search
      weight: 2
      params:
        type: search
    - name: GitHub
      weight: 3
      url: "https://github.com/ssp-data/neomd"
      params:
        icon: github

  sidebar:
    - name: More
      params:
        type: separator
      weight: 100
    - name: Changelog
      url: "https://github.com/ssp-data/neomd/blob/main/CHANGELOG.md"
      weight: 101
    - name: Security
      url: "https://github.com/ssp-data/neomd/blob/main/SECURITY.md"
      weight: 110
    - name: Roadmap
      url: "https://www.ssp.sh/brain/neomd#roadmap"
      weight: 120

params:
  description: "Keyboard-first TUI email: write in Neovim, render as Markdown, screen senders first, organize emails once."
  images:
    - /images/neomd-hero.png

  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: true
    displayPoweredBy: true

  editURL:
    enable: true
    base: "https://github.com/ssp-data/neomd/edit/main/docs/content/docs"
